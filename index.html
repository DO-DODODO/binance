<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Live</title>
<style>
:root {
  --bg1: #0b0e11;
  --bg2: #161a1e;
  --bg3: #1e2329;
  --text: #eaecef;
  --text2: #848e9c;
  --buy: #0ecb81;
  --sell: #f6465d;
  --border: #2b3139;
  --yellow: #f0b90b;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  background: var(--bg1);
  color: var(--text);
  font-family: 'Roboto Mono', 'Courier New', monospace;
  font-size: 12px;
  overflow: hidden;
}
body { display:flex; flex-direction:column; }

/* ── HEADER ── */
.hdr {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.sym-wrap { position:relative; }
.sym-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  min-width: 130px;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.5px;
}
.sym-btn:hover { border-color: var(--yellow); }
.sym-drop {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 230px;
  z-index: 300;
  display: none;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6);
}
.sym-drop.open { display: block; }
.sym-search-input {
  width: 100%;
  background: var(--bg3);
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 12px;
  outline: none;
}
.sym-ul {
  list-style: none;
  max-height: 280px;
  overflow-y: auto;
}
.sym-ul li {
  padding: 7px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sym-ul li:hover { background: var(--bg3); color: var(--yellow); }
.sym-p { color: var(--text2); font-size: 11px; }

.price-area { display:flex; align-items:baseline; gap:8px; }
.cur-price { font-size: 21px; font-weight: 700; color: var(--buy); }
.cur-price.down { color: var(--sell); }
.pct { font-size: 12px; color: var(--buy); }
.pct.down { color: var(--sell); }

.conn { margin-left:auto; display:flex; align-items:center; gap:5px; color:var(--text2); font-size:11px; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--sell); flex-shrink:0; }
.dot.on { background:var(--buy); }

/* ── MAIN ── */
.main { flex:1; display:flex; overflow:hidden; min-height:0; }

/* ── PANELS ── */
.panel { display:flex; flex-direction:column; overflow:hidden; }
.panel + .panel { border-left: 1px solid var(--border); }
.ctrl {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.col-hdr {
  padding: 4px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  font-size: 11px;
  display: grid;
  flex-shrink: 0;
}
select, input[type=number] {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 7px;
  border-radius: 3px;
  font-family: inherit;
  font-size: 11px;
  outline: none;
}
select:focus, input:focus { border-color: var(--yellow); }
label { color: var(--text2); font-size: 11px; white-space: nowrap; }
.vtog { display:flex; gap:2px; }
.vtog button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 3px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
}
.vtog button.on { background:var(--bg3); color:var(--text); border-color:var(--text2); }

/* ── ORDER BOOK ── */
.ob-panel { width: 330px; min-width: 260px; }
.ob-col { grid-template-columns: 1.2fr 1fr 1fr 1fr; }
.ob-body { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
.asks-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; min-height:0; }
.bids-wrap { flex:1; overflow:hidden; min-height:0; }
.spread {
  padding: 5px 10px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.sp-price { font-size:16px; font-weight:700; color:var(--buy); }
.sp-price.down { color: var(--sell); }
.sp-val { font-size:11px; color:var(--text2); }
.ob-row {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  padding: 1.5px 10px;
  position: relative;
  cursor: default;
  user-select: none;
}
.ob-row:hover { background: rgba(255,255,255,0.04); }
.depth-bar {
  position: absolute; top:0; right:0;
  height:100%; pointer-events:none; opacity:0.13;
}
.ob-row.ask .depth-bar { background: var(--sell); }
.ob-row.bid .depth-bar { background: var(--buy); }
.ob-row > span { position:relative; z-index:1; }
.ob-row.ask .ob-price { color: var(--sell); }
.ob-row.bid .ob-price { color: var(--buy); }
.ob-qty, .ob-cum, .ob-tot { text-align:right; color:var(--text2); }
.ob-tot { font-weight:600; }
.ob-tot.hl-sell { color: var(--sell) !important; }
.ob-tot.hl-buy  { color: var(--buy)  !important; }

/* ── TRADES ── */
.tr-panel { flex:1; }
.tr-col { grid-template-columns: var(--tw1,40%) var(--tw2,33%) var(--tw3,27%); }
.tr-body { flex:1; overflow-y:auto; min-height:0; }
.tr-row {
  display: grid;
  grid-template-columns: var(--tw1,40%) var(--tw2,33%) var(--tw3,27%);
  padding: 2.5px 10px;
}
.tr-row > span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rz-col {
  cursor: col-resize;
  user-select: none;
  position: relative;
}
.rz-col::after {
  content: '';
  position: absolute;
  right: 0; top: 20%; bottom: 20%;
  width: 2px;
  background: var(--border);
  border-radius: 1px;
  transition: background 0.15s;
}
.rz-col:hover::after, .rz-col.dragging::after { background: var(--yellow); }
.tr-row.buy .t-price  { color: var(--buy); }
.tr-row.sell .t-price { color: var(--sell); }
.t-qty, .t-time { text-align:right; color:var(--text2); }
.tr-row.hl {
  background: rgba(240,185,11,0.1);
  border-left: 2px solid var(--yellow);
}
.tr-row.hl .t-qty { color:var(--yellow); font-weight:700; }
.tr-row.hl.flash  { background: rgba(240,185,11,0.1); }

/* ── TR WRAPPER ── */
.tr-col-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-left: 1px solid var(--border);
  min-width: 0;
}
.tr-col-wrap .tr-panel { border-left: none !important; }

/* ── CALCULATOR ── */
.calc-panel {
  border-top: 1px solid var(--border);
  background: var(--bg2);
  padding: 8px 10px;
  flex-shrink: 0;
}
.calc-inputs {
  display: flex;
  gap: 6px 12px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 6px;
}
.calc-meta {
  display: flex;
  gap: 14px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
  font-size: 11px;
  color: var(--text2);
}
.calc-meta b { color: var(--text); font-weight: 600; }
.calc-results {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px 16px;
}
.calc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 4px;
}
.calc-lbl { color: var(--text2); font-size: 11px; white-space: nowrap; }
.calc-val { font-size: 12px; font-weight: 600; white-space: nowrap; }
.calc-val.pos { color: var(--buy); }
.calc-val.neg { color: var(--sell); }

/* scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  body { overflow:hidden; }
  .main { flex-direction:column; }
  .ob-panel {
    width:100%; min-width:unset;
    flex:1;
    border-left:none !important;
    border-bottom: 1px solid var(--border);
  }
  .tr-col-wrap { flex:1; border-left:none !important; }
  .calc-results { grid-template-columns: 1fr; }
  .hdr { padding:6px 10px; gap:8px; }
  .cur-price { font-size:16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="sym-wrap" id="symWrap">
    <button class="sym-btn" id="symBtn">
      <span id="symLabel">BTCUSDT</span>
      <span style="color:var(--text2);font-size:10px">▼</span>
    </button>
    <div class="sym-drop" id="symDrop">
      <input class="sym-search-input" id="symSearch" placeholder="종목 검색 (예: BTC)">
      <ul class="sym-ul" id="symUl"></ul>
    </div>
  </div>
  <div class="price-area">
    <span class="cur-price" id="curPrice">--</span>
    <span class="pct" id="pct"></span>
  </div>
  <div class="conn">
    <span class="dot" id="dot"></span>
    <span id="connTxt">연결 중...</span>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- ORDER BOOK -->
  <div class="panel ob-panel">
    <div class="ctrl">
      <div class="vtog" id="vtog">
        <button class="on" data-v="both"  onclick="setView('both')">전체</button>
        <button          data-v="asks"  onclick="setView('asks')">매도</button>
        <button          data-v="bids"  onclick="setView('bids')">매수</button>
      </div>
      <label>호가수
        <select id="lvlSel" onchange="onLvlChange()">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
        </select>
      </label>
      <label>단위
        <select id="unitSel" onchange="onUnitChange()"></select>
      </label>
    </div>
    <div class="col-hdr ob-col">
      <span>가격(USDT)</span>
      <span style="text-align:right">수량</span>
      <span style="text-align:right">누적</span>
      <span style="text-align:right">총합계</span>
    </div>
    <div class="ob-body">
      <div class="asks-wrap" id="asksWrap"></div>
      <div class="spread" id="spread">
        <span class="sp-price" id="spPrice">--</span>
        <span class="sp-val"   id="spVal"></span>
      </div>
      <div class="bids-wrap" id="bidsWrap"></div>
    </div>
  </div>

  <!-- TRADES + CALCULATOR -->
  <div class="tr-col-wrap">
  <div class="panel tr-panel">
    <div class="ctrl">
      <label>하이라이트 수량 ≥
        <input type="number" id="hlInput" placeholder="없음" min="0" step="any" style="width:80px">
      </label>
      <span id="hlLast" style="font-size:12px;"></span>
    </div>
    <div class="col-hdr tr-col" id="trColHdr">
      <span class="rz-col" id="rz0">가격(USDT)</span>
      <span class="rz-col" id="rz1" style="text-align:right">수량</span>
      <span style="text-align:right">시간</span>
    </div>
    <div class="tr-body" id="trBody"></div>
  </div>

  <!-- CALCULATOR -->
  <div class="calc-panel">
    <div class="calc-inputs">
      <label>틱수 <input type="number" id="calcTick" min="1" step="1" value="1" style="width:46px" inputmode="numeric"></label>
      <label>레버리지 <input type="number" id="calcLev" min="1" max="125" step="1" value="10" style="width:46px" inputmode="numeric"></label>
      <label>수수료
        <select id="calcFee">
          <option value="0.0005">테이커 0.05%</option>
          <option value="0.0002">메이커 0.02%</option>
        </select>
      </label>
      <label>진입금액$ <input type="number" id="calcAmt" min="0" step="any" value="1000" style="width:70px" inputmode="decimal"></label>
    </div>
    <div class="calc-meta">
      <span>tickSize: <b id="calcTickSizeVal">--</b></span>
      <span>기준가: <b id="calcBasePxVal">--</b></span>
    </div>
    <div class="calc-results">
      <div class="calc-row"><span class="calc-lbl">틱 이동폭</span><span class="calc-val" id="calcMove">--</span></div>
      <div class="calc-row"><span class="calc-lbl">ROI (수수료 제외)</span><span class="calc-val" id="calcRoiEx">--</span></div>
      <div class="calc-row"><span class="calc-lbl">ROI (수수료 포함)</span><span class="calc-val" id="calcRoiIn">--</span></div>
      <div class="calc-row"><span class="calc-lbl">순수익</span><span class="calc-val" id="calcProfit">--</span></div>
    </div>
  </div>
  </div><!-- /.tr-col-wrap -->

</div>

<script>
// ── STATE ──
let symbol   = 'BTCUSDT';
let ws       = null;
let book     = { asks: new Map(), bids: new Map() };
let snapDone = false;
let buf      = [];
let lastId   = 0;
let trades   = [];
let lastPx   = null;
let pxDir    = 'up';
let view     = 'both';
let levels   = 20;
let unit     = 0;
let allSym   = [];
let symPx    = {};
let symTick  = {};

const MAX_TR = 200;
const OB_MAX = 50;

// ── ELEMENTS ──
const $ = id => document.getElementById(id);
const symBtn   = $('symBtn');
const symLabel = $('symLabel');
const symDrop  = $('symDrop');
const symSearch= $('symSearch');
const symUl    = $('symUl');
const curPriceEl=$('curPrice');
const pctEl    = $('pct');
const dotEl    = $('dot');
const connEl   = $('connTxt');
const asksWrap = $('asksWrap');
const bidsWrap = $('bidsWrap');
const spPrice  = $('spPrice');
const spVal    = $('spVal');
const trBody   = $('trBody');
const lvlSel   = $('lvlSel');
const unitSel  = $('unitSel');
const hlInput  = $('hlInput');

// ── PRE-ALLOCATE OB ROWS ──
const askRowEls = [];
const bidRowEls = [];

function makeObRow(side) {
  const el = document.createElement('div');
  el.className = `ob-row ${side}`;
  el.style.display = 'none';
  const bar = document.createElement('div'); bar.className = 'depth-bar';
  const p   = document.createElement('span'); p.className = 'ob-price';
  const q   = document.createElement('span'); q.className = 'ob-qty';
  const c   = document.createElement('span'); c.className = 'ob-cum';
  const t   = document.createElement('span'); t.className = 'ob-tot';
  el.append(bar, p, q, c, t);
  return el;
}
(function initObRows() {
  for (let i = 0; i < OB_MAX; i++) {
    const a = makeObRow('ask'); askRowEls.push(a); asksWrap.appendChild(a);
    const b = makeObRow('bid'); bidRowEls.push(b); bidsWrap.appendChild(b);
  }
})();

// ── SYMBOL UI ──
symBtn.addEventListener('click', () => {
  symDrop.classList.toggle('open');
  if (symDrop.classList.contains('open')) {
    symSearch.focus();
    if (!allSym.length) loadSymbols();
  }
});
document.addEventListener('click', e => {
  if (!$('symWrap').contains(e.target)) symDrop.classList.remove('open');
});
symSearch.addEventListener('input', () => {
  const q = symSearch.value.toUpperCase().trim();
  renderSymUl(q ? allSym.filter(s => s.includes(q)) : allSym);
});

async function loadSymbols() {
  try {
    const [r1, r2] = await Promise.all([
      fetch('https://fapi.binance.com/fapi/v1/ticker/price'),
      fetch('https://fapi.binance.com/fapi/v1/exchangeInfo')
    ]);
    const prices = await r1.json();
    prices.forEach(d => { symPx[d.symbol] = parseFloat(d.price); });
    const info = await r2.json();
    info.symbols
      .filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT' && s.contractType === 'PERPETUAL')
      .forEach(s => {
        const pf = s.filters.find(f => f.filterType === 'PRICE_FILTER');
        symTick[s.symbol] = pf ? parseFloat(pf.tickSize) : 0;
      });
    allSym = Object.keys(symTick).sort();
    renderSymUl(allSym);
  } catch(e) {
    symUl.innerHTML = '<li style="padding:8px 12px;color:var(--text2)">로드 실패</li>';
  }
}

async function loadTickSize() {
  if (symTick[symbol]) return;
  try {
    const r = await fetch(`https://fapi.binance.com/fapi/v1/exchangeInfo?symbol=${symbol}`);
    const data = await r.json();
    const pf = data.symbols[0].filters.find(f => f.filterType === 'PRICE_FILTER');
    if (pf) symTick[symbol] = parseFloat(pf.tickSize);
  } catch(e) {}
}

function renderSymUl(list) {
  symUl.innerHTML = list.slice(0, 100).map(s => {
    const p = symPx[s];
    const base = s.replace('USDT','');
    return `<li onclick="pickSym('${s}')">
      <span>${base}/USDT</span>
      ${p != null ? `<span class="sym-p">${fmtP(p)}</span>` : ''}
    </li>`;
  }).join('');
}

function pickSym(sym) {
  symbol = sym;
  symLabel.textContent = sym;
  symDrop.classList.remove('open');
  symSearch.value = '';
  resetConnect();
}

// ── WEBSOCKET ──
function resetConnect() {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  book     = { asks: new Map(), bids: new Map() };
  snapDone = false;
  buf      = [];
  lastId   = 0;
  trades   = [];
  lastPx   = null;
  trBody.innerHTML = '';
  for (let i = 0; i < OB_MAX; i++) {
    askRowEls[i].style.display = 'none';
    bidRowEls[i].style.display = 'none';
  }
  unit = 0;
  setConn(false, '연결 중...');
  loadTickSize().then(() => connect());
}

function connect() {
  const s = symbol.toLowerCase();
  ws = new WebSocket(`wss://fstream.binance.com/stream?streams=${s}@depth@100ms/${s}@trade/${s}@ticker`);
  ws.onopen  = () => { setConn(true, '실시간'); loadSnap(); };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    const stream = msg.stream;
    const data   = msg.data;
    if (!stream) return;
    if (stream.includes('@depth'))       onDepthMsg(data);
    else if (stream.includes('@trade'))  onTrade(data);
    else if (stream.includes('@ticker')) onTicker(data);
  };
  ws.onclose = () => { setConn(false, '재연결 중...'); setTimeout(connect, 2500); };
  ws.onerror = () => ws && ws.close();
}

async function loadSnap() {
  try {
    const r = await fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${symbol}&limit=1000`);
    const snap = await r.json();
    book.asks = new Map(snap.asks);
    book.bids = new Map(snap.bids);
    lastId = snap.lastUpdateId;
    for (const ev of buf) applyDiff(ev);
    buf = [];
    snapDone = true;
    rebuildUnitOpts();
    renderOB();
    calcUpdate();
  } catch(e) { setTimeout(loadSnap, 1200); }
}

let rafOB = null;
let rafTR = null;
let pendingTrades = [];
const OB_INTERVAL = 180;
function scheduleOB() { if (!rafOB) rafOB = setTimeout(() => { rafOB = null; renderOB(); }, OB_INTERVAL); }
function scheduleTR(t) {
  pendingTrades.push(t);
  if (!rafTR) rafTR = requestAnimationFrame(() => { rafTR = null; flushTrades(); });
}

function onDepthMsg(data) {
  if (!snapDone) { buf.push(data); return; }
  applyDiff(data);
  scheduleOB();
}
function applyDiff(ev) {
  if (ev.u <= lastId) return;
  ev.a.forEach(([p,q]) => parseFloat(q) === 0 ? book.asks.delete(p) : book.asks.set(p,q));
  ev.b.forEach(([p,q]) => parseFloat(q) === 0 ? book.bids.delete(p) : book.bids.set(p,q));
  lastId = ev.u;
}

// ── PRICE UNIT ──
function buildUnitOpts(tick, price) {
  const n = Math.min(5, Math.max(1, Math.floor(Math.log10(price / tick))));
  const opts = [];
  for (let i = 0; i < n; i++) {
    opts.push(parseFloat((tick * Math.pow(10, i)).toPrecision(8)));
  }
  return opts;
}

function rebuildUnitOpts() {
  if (!lastPx) return;
  const tick = symTick[symbol];
  const opts = tick ? buildUnitOpts(tick, lastPx) : buildUnitOpts(
    lastPx >= 1000 ? 0.01 : lastPx >= 1 ? 0.0001 : 0.00001,
    lastPx
  );
  const prev = unit || opts[0];
  unitSel.innerHTML = opts.map(u => {
    const label = u < 0.001 ? u.toFixed(8).replace(/\.?0+$/, '') : u;
    return `<option value="${u}"${u===prev?' selected':''}>${label}</option>`;
  }).join('');
  unit = parseFloat(unitSel.value);
}

function onUnitChange() { unit = parseFloat(unitSel.value); renderOB(); }
function onLvlChange()  { levels = parseInt(lvlSel.value); renderOB(); }

// ── GROUP BOOK ──
function groupSide(map, side) {
  const arr = [...map.entries()].map(([p,q]) => [parseFloat(p), parseFloat(q)]);
  if (!unit) {
    return side === 'asks' ? arr.sort((a,b)=>a[0]-b[0]) : arr.sort((a,b)=>b[0]-a[0]);
  }
  const grp = new Map();
  for (const [p,q] of arr) {
    const k = side === 'asks'
      ? parseFloat((Math.ceil(p / unit) * unit).toPrecision(12))
      : parseFloat((Math.floor(p / unit) * unit).toPrecision(12));
    grp.set(k, (grp.get(k) || 0) + q);
  }
  const out = [...grp.entries()];
  return side === 'asks' ? out.sort((a,b)=>a[0]-b[0]) : out.sort((a,b)=>b[0]-a[0]);
}

// ── RENDER ORDER BOOK ──
function setObRow(el, p, q, cumQ, totQ, maxQ, isAsk, totHl) {
  const bar = el.children[0];
  const pEl = el.children[1];
  const qEl = el.children[2];
  const cEl = el.children[3];
  const tEl = el.children[4];
  bar.style.width   = (q / maxQ * 100).toFixed(1) + '%';
  pEl.textContent   = fmtP(p);
  qEl.textContent   = fmtQ(q);
  cEl.textContent   = fmtQ(cumQ);
  tEl.textContent   = fmtQ(totQ);
  const cls = isAsk ? (totHl ? 'ob-tot hl-sell' : 'ob-tot') : (totHl ? 'ob-tot hl-buy' : 'ob-tot');
  if (tEl.className !== cls) tEl.className = cls;
  if (el.style.display !== '') el.style.display = '';
}

function renderOB() {
  if (!snapDone) return;

  const asksRaw = groupSide(book.asks, 'asks').slice(0, levels);
  const bidsRaw = groupSide(book.bids, 'bids').slice(0, levels);

  const askTot = asksRaw.reduce((s,[,q])=>s+q, 0);
  const bidTot = bidsRaw.reduce((s,[,q])=>s+q, 0);
  const askHl  = askTot >= bidTot * 1.5;
  const bidHl  = bidTot >= askTot * 1.5;

  let maxQ = 0;
  for (const [,q] of asksRaw) if (q > maxQ) maxQ = q;
  for (const [,q] of bidsRaw) if (q > maxQ) maxQ = q;
  if (!maxQ) maxQ = 1;

  // ASKS: top = highest, bottom = lowest (nearest spread)
  if (view !== 'bids') {
    const rev  = [...asksRaw].reverse();
    const cums = new Array(rev.length);
    let run = 0;
    for (let i = rev.length - 1; i >= 0; i--) { run += rev[i][1]; cums[i] = run; }
    for (let i = 0; i < OB_MAX; i++) {
      if (i < rev.length) {
        setObRow(askRowEls[i], rev[i][0], rev[i][1], cums[i], askTot, maxQ, true, askHl);
      } else if (askRowEls[i].style.display !== 'none') {
        askRowEls[i].style.display = 'none';
      }
    }
  } else {
    for (let i = 0; i < OB_MAX; i++) askRowEls[i].style.display = 'none';
  }

  // BIDS: top = highest (nearest spread), cumulative grows down
  if (view !== 'asks') {
    let cum = 0;
    for (let i = 0; i < OB_MAX; i++) {
      if (i < bidsRaw.length) {
        cum += bidsRaw[i][1];
        setObRow(bidRowEls[i], bidsRaw[i][0], bidsRaw[i][1], cum, bidTot, maxQ, false, bidHl);
      } else if (bidRowEls[i].style.display !== 'none') {
        bidRowEls[i].style.display = 'none';
      }
    }
  } else {
    for (let i = 0; i < OB_MAX; i++) bidRowEls[i].style.display = 'none';
  }

  // SPREAD
  if (asksRaw.length && bidsRaw.length) {
    const ba = asksRaw[0][0], bb = bidsRaw[0][0];
    spVal.textContent = `스프레드 ${(ba - bb).toFixed(decPl(ba))}`;
  }
  if (lastPx != null) {
    spPrice.textContent = fmtP(lastPx);
    spPrice.className   = `sp-price ${pxDir}`;
  }
}

// ── TRADES ──
function onTrade(d) {
  const price = parseFloat(d.p);
  pxDir  = price >= (lastPx ?? price) ? 'up' : 'down';
  lastPx = price;
  curPriceEl.textContent = fmtP(price);
  curPriceEl.className   = 'cur-price' + (pxDir === 'down' ? ' down' : '');
  if (!unit) rebuildUnitOpts();
  scheduleCalc();
  const t = { price, qty: parseFloat(d.q), time: d.T, buy: !d.m };
  trades.unshift(t);
  if (trades.length > MAX_TR) trades.pop();
  scheduleTR(t);
}

function updateHlLast(t) {
  const el = $('hlLast');
  if (!t) { el.textContent = ''; return; }
  el.innerHTML = `<span style="color:${t.buy ? 'var(--buy)' : 'var(--sell)'};font-weight:700">${fmtP(t.price)}</span> <span style="color:var(--text2)">${fmtQ(t.qty)}</span>`;
}

function flushTrades() {
  const thr  = parseFloat(hlInput.value);
  const hasT = !isNaN(thr) && thr > 0;
  const frag = document.createDocumentFragment();
  for (const t of pendingTrades) {
    const isHl = hasT && t.qty >= thr;
    const div = document.createElement('div');
    div.className = `tr-row flash ${t.buy ? 'buy' : 'sell'}${isHl ? ' hl' : ''}`;
    div.innerHTML = `<span class="t-price">${fmtP(t.price)}</span><span class="t-qty">${fmtQ(t.qty)}</span><span class="t-time">${fmtTime(t.time)}</span>`;
    frag.appendChild(div);
    if (isHl) updateHlLast(t);
  }
  pendingTrades = [];
  trBody.insertBefore(frag, trBody.firstChild);
  while (trBody.children.length > MAX_TR) trBody.removeChild(trBody.lastChild);
}

function renderTrades() {
  const thr  = parseFloat(hlInput.value);
  const hasT = !isNaN(thr) && thr > 0;
  trBody.innerHTML = trades.map(t => {
    const hl = hasT && t.qty >= thr ? ' hl' : '';
    return `<div class="tr-row ${t.buy?'buy':'sell'}${hl}"><span class="t-price">${fmtP(t.price)}</span><span class="t-qty">${fmtQ(t.qty)}</span><span class="t-time">${fmtTime(t.time)}</span></div>`;
  }).join('');
}
hlInput.addEventListener('input', () => { renderTrades(); updateHlLast(null); });

// ── TICKER ──
function onTicker(d) {
  const pct = parseFloat(d.P);
  if (!isFinite(pct)) return;
  const sign = pct >= 0 ? '+' : '';
  pctEl.textContent = `${sign}${pct.toFixed(2)}%`;
  pctEl.className   = 'pct' + (pct < 0 ? ' down' : '');
}

// ── VIEW TOGGLE ──
function setView(v) {
  view = v;
  document.querySelectorAll('#vtog button').forEach(b => b.classList.toggle('on', b.dataset.v === v));
  renderOB();
}

// ── CONN STATUS ──
function setConn(on, txt) {
  dotEl.className = 'dot' + (on ? ' on' : '');
  connEl.textContent = txt;
}

// ── FORMAT ──
function fmtP(p) {
  if (p == null) return '--';
  if (p >= 1000) return p.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
  if (p >= 1)    return p.toFixed(4);
  if (p >= 0.001) return p.toFixed(6);
  return p.toFixed(8);
}
function fmtQ(q) {
  if (q >= 100000) return q.toLocaleString('en-US', { maximumFractionDigits:0 });
  if (q >= 1000)   return q.toLocaleString('en-US', { maximumFractionDigits:2 });
  if (q >= 1)      return q.toFixed(4);
  return q.toFixed(6);
}
function decPl(p) {
  if (p >= 1000) return 2;
  if (p >= 1)    return 4;
  return 6;
}
function fmtTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0') + ':' +
         d.getSeconds().toString().padStart(2,'0');
}

// ── COLUMN RESIZE ──
let trW = [40, 33, 27]; // percentages
let rzState = null;

function applyTrW() {
  const s = document.documentElement.style;
  s.setProperty('--tw1', trW[0] + '%');
  s.setProperty('--tw2', trW[1] + '%');
  s.setProperty('--tw3', trW[2] + '%');
}

function rzStart(e, col) {
  e.preventDefault();
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  rzState = { col, startX: x, startW: [...trW] };
  document.getElementById('rz' + col).classList.add('dragging');
}

function rzMove(e) {
  if (!rzState) return;
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const dx = x - rzState.startX;
  const panelW = document.querySelector('.tr-panel').offsetWidth;
  const dPct = (dx / panelW) * 100;
  const col = rzState.col;
  const sw = rzState.startW;
  trW = [...sw];
  if (col === 0) {
    trW[0] = Math.max(15, Math.min(sw[0] + dPct, 100 - 15 - sw[2]));
    trW[1] = 100 - trW[0] - sw[2];
  } else {
    trW[1] = Math.max(15, Math.min(sw[1] + dPct, 100 - sw[0] - 15));
    trW[2] = 100 - sw[0] - trW[1];
  }
  applyTrW();
}

function rzEnd() {
  if (!rzState) return;
  document.getElementById('rz' + rzState.col).classList.remove('dragging');
  rzState = null;
}

document.getElementById('rz0').addEventListener('mousedown',  e => rzStart(e, 0));
document.getElementById('rz1').addEventListener('mousedown',  e => rzStart(e, 1));
document.getElementById('rz0').addEventListener('touchstart', e => rzStart(e, 0), { passive: false });
document.getElementById('rz1').addEventListener('touchstart', e => rzStart(e, 1), { passive: false });
document.addEventListener('mousemove', rzMove);
document.addEventListener('mouseup',   rzEnd);
document.addEventListener('touchmove', e => { if (rzState) { e.preventDefault(); rzMove(e); } }, { passive: false });
document.addEventListener('touchend',  rzEnd);

applyTrW();

// ── CALCULATOR ──
const CALC_LS = 'bnCalc';
let calcRaf = null;

function scheduleCalc() {
  if (!calcRaf) calcRaf = requestAnimationFrame(() => { calcRaf = null; calcUpdate(); });
}

function calcSave() {
  localStorage.setItem(CALC_LS, JSON.stringify({
    tick: $('calcTick').value,
    lev:  $('calcLev').value,
    fee:  $('calcFee').value,
    amt:  $('calcAmt').value
  }));
}

function calcLoad() {
  try {
    const s = JSON.parse(localStorage.getItem(CALC_LS));
    if (!s) return;
    if (s.tick != null) $('calcTick').value = s.tick;
    if (s.lev  != null) $('calcLev').value  = s.lev;
    if (s.fee  != null) $('calcFee').value  = s.fee;
    if (s.amt  != null) $('calcAmt').value  = s.amt;
  } catch(e) {}
}

function tickDecimals(ts) {
  if (ts >= 1) return 0;
  const s = ts.toFixed(10).replace(/0+$/, '');
  const dot = s.indexOf('.');
  return dot < 0 ? 0 : s.length - dot - 1;
}

function calcUpdate() {
  const ticks = Math.max(1, parseInt($('calcTick').value) || 1);
  const lev   = Math.max(1, parseFloat($('calcLev').value) || 1);
  const fee   = parseFloat($('calcFee').value) || 0.0005;
  const amt   = parseFloat($('calcAmt').value) || 0;
  const ts    = symTick[symbol] || 0;
  const px    = lastPx;

  const dec = ts ? tickDecimals(ts) : 0;
  $('calcTickSizeVal').textContent = ts ? ts.toFixed(dec) : '--';
  $('calcBasePxVal').textContent   = px ? fmtP(px) : '--';

  if (!ts || !px) {
    ['calcMove','calcRoiEx','calcRoiIn','calcProfit'].forEach(id => {
      $(id).textContent = '--'; $(id).className = 'calc-val';
    });
    return;
  }

  const move   = ts * ticks;
  const roiEx  = (move / px) * lev * 100;
  const feePct = fee * 2 * lev * 100;
  const roiIn  = roiEx - feePct;
  const profit = amt * roiIn / 100;

  $('calcMove').textContent = '$' + move.toFixed(dec);
  $('calcMove').className   = 'calc-val';

  const setV = (id, txt, v) => {
    const el = $(id);
    el.textContent = txt;
    el.className = 'calc-val ' + (v >= 0 ? 'pos' : 'neg');
  };
  setV('calcRoiEx',  roiEx.toFixed(3) + '%', roiEx);
  setV('calcRoiIn',  roiIn.toFixed(3) + '%', roiIn);
  setV('calcProfit', (profit >= 0 ? '+$' : '-$') + Math.abs(profit).toFixed(2), profit);
}

['calcTick','calcLev','calcFee','calcAmt'].forEach(id => {
  $(id).addEventListener('input', () => { calcUpdate(); calcSave(); });
});

// ── INIT ──
calcLoad();
resetConnect();
</script>
