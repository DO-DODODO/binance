<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Live</title>
<style>
:root {
  --bg1: #0b0e11;
  --bg2: #161a1e;
  --bg3: #1e2329;
  --text: #eaecef;
  --text2: #848e9c;
  --buy: #0ecb81;
  --sell: #f6465d;
  --border: #2b3139;
  --yellow: #f0b90b;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  background: var(--bg1);
  color: var(--text);
  font-family: 'Roboto Mono', 'Courier New', monospace;
  font-size: 12px;
  overflow: hidden;
}
body { display:flex; flex-direction:column; }

/* ── HEADER ── */
.hdr {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.sym-wrap { position:relative; }
.sym-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  min-width: 130px;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.5px;
}
.sym-btn:hover { border-color: var(--yellow); }
.sym-drop {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 230px;
  z-index: 300;
  display: none;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6);
}
.sym-drop.open { display: block; }
.sym-search-input {
  width: 100%;
  background: var(--bg3);
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 12px;
  outline: none;
}
.sym-ul {
  list-style: none;
  max-height: 280px;
  overflow-y: auto;
}
.sym-ul li {
  padding: 7px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sym-ul li:hover { background: var(--bg3); color: var(--yellow); }
.sym-p { color: var(--text2); font-size: 11px; }

.price-area { display:flex; align-items:baseline; gap:8px; }
.cur-price { font-size: 21px; font-weight: 700; color: var(--buy); }
.cur-price.down { color: var(--sell); }
.pct { font-size: 12px; color: var(--buy); }
.pct.down { color: var(--sell); }

.conn { margin-left:auto; display:flex; align-items:center; gap:5px; color:var(--text2); font-size:11px; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--sell); flex-shrink:0; }
.dot.on { background:var(--buy); }

/* ── MAIN ── */
.main { flex:1; display:flex; overflow:hidden; min-height:0; }

/* ── PANELS ── */
.panel { display:flex; flex-direction:column; overflow:hidden; }
.panel + .panel { border-left: 1px solid var(--border); }
.ctrl {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.col-hdr {
  padding: 4px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  font-size: 11px;
  display: grid;
  flex-shrink: 0;
}
select, input[type=number] {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 7px;
  border-radius: 3px;
  font-family: inherit;
  font-size: 11px;
  outline: none;
}
select:focus, input:focus { border-color: var(--yellow); }
label { color: var(--text2); font-size: 11px; white-space: nowrap; }
.vtog { display:flex; gap:2px; }
.vtog button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 3px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
}
.vtog button.on { background:var(--bg3); color:var(--text); border-color:var(--text2); }

/* ── ORDER BOOK ── */
.ob-panel { width: 330px; min-width: 260px; }
.ob-col { grid-template-columns: 1.2fr 1fr 1fr 1fr; }
.ob-body { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
.asks-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; min-height:0; }
.bids-wrap { flex:1; overflow:hidden; min-height:0; }
.spread {
  padding: 5px 10px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.sp-price { font-size:16px; font-weight:700; color:var(--buy); }
.sp-price.down { color: var(--sell); }
.sp-val { font-size:11px; color:var(--text2); }
.ob-row {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  padding: 1.5px 10px;
  position: relative;
  cursor: default;
  user-select: none;
}
.ob-row:hover { background: rgba(255,255,255,0.04); }
.depth-bar {
  position: absolute; top:0; right:0;
  height:100%; pointer-events:none; opacity:0.13;
}
.ob-row.ask .depth-bar { background: var(--sell); }
.ob-row.bid .depth-bar { background: var(--buy); }
.ob-row > span { position:relative; z-index:1; }
.ob-row.ask .ob-price { color: var(--sell); }
.ob-row.bid .ob-price { color: var(--buy); }
.ob-qty, .ob-cum, .ob-tot { text-align:right; color:var(--text2); }
.ob-tot { font-weight:600; }
.ob-tot.hl-sell { color: var(--sell) !important; }
.ob-tot.hl-buy  { color: var(--buy)  !important; }

/* ── TRADES ── */
.tr-panel { flex:1; }
.tr-col { grid-template-columns: 1fr 1fr 1fr; }
.tr-body { flex:1; overflow-y:auto; min-height:0; }
.tr-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding: 2px 10px;
}
.tr-row.buy .t-price  { color: var(--buy); }
.tr-row.sell .t-price { color: var(--sell); }
.t-qty, .t-time { text-align:right; color:var(--text2); }
.tr-row.hl {
  background: rgba(240,185,11,0.1);
  border-left: 2px solid var(--yellow);
}
.tr-row.hl .t-qty { color:var(--yellow); font-weight:700; }

/* scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  body { overflow:hidden; }
  .main { flex-direction:column; }
  .ob-panel {
    width:100%; min-width:unset;
    flex:1;
    border-left:none !important;
    border-bottom: 1px solid var(--border);
  }
  .tr-panel { flex:1; border-left:none !important; }
  .hdr { padding:6px 10px; gap:8px; }
  .cur-price { font-size:16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="sym-wrap" id="symWrap">
    <button class="sym-btn" id="symBtn">
      <span id="symLabel">BTCUSDT</span>
      <span style="color:var(--text2);font-size:10px">▼</span>
    </button>
    <div class="sym-drop" id="symDrop">
      <input class="sym-search-input" id="symSearch" placeholder="종목 검색 (예: BTC)">
      <ul class="sym-ul" id="symUl"></ul>
    </div>
  </div>
  <div class="price-area">
    <span class="cur-price" id="curPrice">--</span>
    <span class="pct" id="pct"></span>
  </div>
  <div class="conn">
    <span class="dot" id="dot"></span>
    <span id="connTxt">연결 중...</span>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- ORDER BOOK -->
  <div class="panel ob-panel">
    <div class="ctrl">
      <div class="vtog" id="vtog">
        <button class="on" data-v="both"  onclick="setView('both')">전체</button>
        <button          data-v="asks"  onclick="setView('asks')">매도</button>
        <button          data-v="bids"  onclick="setView('bids')">매수</button>
      </div>
      <label>호가수
        <select id="lvlSel" onchange="onLvlChange()">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
        </select>
      </label>
      <label>단위
        <select id="unitSel" onchange="onUnitChange()"></select>
      </label>
    </div>
    <div class="col-hdr ob-col">
      <span>가격(USDT)</span>
      <span style="text-align:right">수량</span>
      <span style="text-align:right">누적</span>
      <span style="text-align:right">총합계</span>
    </div>
    <div class="ob-body">
      <div class="asks-wrap" id="asksWrap"></div>
      <div class="spread" id="spread">
        <span class="sp-price" id="spPrice">--</span>
        <span class="sp-val"   id="spVal"></span>
      </div>
      <div class="bids-wrap" id="bidsWrap"></div>
    </div>
  </div>

  <!-- TRADES -->
  <div class="panel tr-panel">
    <div class="ctrl">
      <label>하이라이트 수량 ≥
        <input type="number" id="hlInput" placeholder="없음" min="0" step="any" style="width:80px">
      </label>
    </div>
    <div class="col-hdr tr-col">
      <span>가격(USDT)</span>
      <span style="text-align:right">수량</span>
      <span style="text-align:right">시간</span>
    </div>
    <div class="tr-body" id="trBody"></div>
  </div>

</div>

<script>
// ── STATE ──
let symbol   = 'BTCUSDT';
let ws       = null;
let book     = { asks: new Map(), bids: new Map() };
let snapDone = false;
let buf      = [];
let lastId   = 0;
let trades   = [];
let lastPx   = null;
let pxDir    = 'up';
let view     = 'both';
let levels   = 20;
let unit     = 0;
let allSym   = [];
let symPx    = {};

const MAX_TR = 100;

// ── ELEMENTS ──
const $ = id => document.getElementById(id);
const symBtn   = $('symBtn');
const symLabel = $('symLabel');
const symDrop  = $('symDrop');
const symSearch= $('symSearch');
const symUl    = $('symUl');
const curPriceEl=$('curPrice');
const pctEl    = $('pct');
const dotEl    = $('dot');
const connEl   = $('connTxt');
const asksWrap = $('asksWrap');
const bidsWrap = $('bidsWrap');
const spPrice  = $('spPrice');
const spVal    = $('spVal');
const trBody   = $('trBody');
const lvlSel   = $('lvlSel');
const unitSel  = $('unitSel');
const hlInput  = $('hlInput');

// ── SYMBOL UI ──
symBtn.addEventListener('click', () => {
  symDrop.classList.toggle('open');
  if (symDrop.classList.contains('open')) {
    symSearch.focus();
    if (!allSym.length) loadSymbols();
  }
});
document.addEventListener('click', e => {
  if (!$('symWrap').contains(e.target)) symDrop.classList.remove('open');
});
symSearch.addEventListener('input', () => {
  const q = symSearch.value.toUpperCase().trim();
  renderSymUl(q ? allSym.filter(s => s.includes(q)) : allSym);
});

async function loadSymbols() {
  try {
    const [r1, r2] = await Promise.all([
      fetch('https://api.binance.com/api/v3/ticker/price'),
      fetch('https://api.binance.com/api/v3/exchangeInfo')
    ]);
    const prices = await r1.json();
    prices.forEach(d => { symPx[d.symbol] = parseFloat(d.price); });
    const info = await r2.json();
    allSym = info.symbols
      .filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT')
      .map(s => s.symbol)
      .sort();
    renderSymUl(allSym);
  } catch(e) {
    symUl.innerHTML = '<li style="padding:8px 12px;color:var(--text2)">로드 실패</li>';
  }
}

function renderSymUl(list) {
  symUl.innerHTML = list.slice(0, 100).map(s => {
    const p = symPx[s];
    const base = s.replace('USDT','');
    return `<li onclick="pickSym('${s}')">
      <span>${base}/USDT</span>
      ${p != null ? `<span class="sym-p">${fmtP(p)}</span>` : ''}
    </li>`;
  }).join('');
}

function pickSym(sym) {
  symbol = sym;
  symLabel.textContent = sym;
  symDrop.classList.remove('open');
  symSearch.value = '';
  resetConnect();
}

// ── WEBSOCKET ──
function resetConnect() {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  book     = { asks: new Map(), bids: new Map() };
  snapDone = false;
  buf      = [];
  lastId   = 0;
  trades   = [];
  lastPx   = null;
  trBody.innerHTML   = '';
  asksWrap.innerHTML = '';
  bidsWrap.innerHTML = '';
  setConn(false, '연결 중...');
  connect();
}

function connect() {
  const s = symbol.toLowerCase();
  ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${s}@depth@100ms/${s}@trade/${s}@ticker`);
  ws.onopen  = () => { setConn(true, '실시간'); loadSnap(); };
  ws.onmessage = e => {
    const { stream, data } = JSON.parse(e.data);
    if (stream.includes('@depth'))  onDepthMsg(data);
    else if (stream.includes('@trade'))  onTrade(data);
    else if (stream.includes('@ticker')) onTicker(data);
  };
  ws.onclose = () => { setConn(false, '재연결 중...'); setTimeout(connect, 2500); };
  ws.onerror = () => ws && ws.close();
}

async function loadSnap() {
  try {
    const r = await fetch(`https://api.binance.com/api/v3/depth?symbol=${symbol}&limit=1000`);
    const snap = await r.json();
    book.asks = new Map(snap.asks);
    book.bids = new Map(snap.bids);
    lastId = snap.lastUpdateId;
    for (const ev of buf) applyDiff(ev);
    buf = [];
    snapDone = true;
    rebuildUnitOpts();
    renderOB();
  } catch(e) { setTimeout(loadSnap, 1200); }
}

function onDepthMsg(data) {
  if (!snapDone) { buf.push(data); return; }
  applyDiff(data);
  renderOB();
}
function applyDiff(ev) {
  if (ev.u <= lastId) return;
  ev.a.forEach(([p,q]) => parseFloat(q) === 0 ? book.asks.delete(p) : book.asks.set(p,q));
  ev.b.forEach(([p,q]) => parseFloat(q) === 0 ? book.bids.delete(p) : book.bids.set(p,q));
  lastId = ev.u;
}

// ── PRICE UNIT ──
function rebuildUnitOpts() {
  if (!lastPx) return;
  const p = lastPx;
  let opts;
  if      (p >= 50000) opts = [0.01, 0.1, 1, 10, 100];
  else if (p >= 10000) opts = [0.01, 0.1, 1, 10];
  else if (p >= 1000)  opts = [0.001, 0.01, 0.1, 1, 10];
  else if (p >= 100)   opts = [0.001, 0.01, 0.1, 1];
  else if (p >= 1)     opts = [0.0001, 0.001, 0.01, 0.1];
  else                 opts = [0.00001, 0.0001, 0.001, 0.01];
  const prev = unit || opts[0];
  unitSel.innerHTML = opts.map(u => `<option value="${u}"${u===prev?' selected':''}>${u}</option>`).join('');
  unit = parseFloat(unitSel.value);
}

function onUnitChange() { unit = parseFloat(unitSel.value); renderOB(); }
function onLvlChange()  { levels = parseInt(lvlSel.value); renderOB(); }

// ── GROUP BOOK ──
function groupSide(map, side) {
  const arr = [...map.entries()].map(([p,q]) => [parseFloat(p), parseFloat(q)]);
  if (!unit) {
    return side === 'asks' ? arr.sort((a,b)=>a[0]-b[0]) : arr.sort((a,b)=>b[0]-a[0]);
  }
  const grp = new Map();
  for (const [p,q] of arr) {
    const k = side === 'asks'
      ? parseFloat((Math.ceil(p / unit) * unit).toPrecision(12))
      : parseFloat((Math.floor(p / unit) * unit).toPrecision(12));
    grp.set(k, (grp.get(k) || 0) + q);
  }
  const out = [...grp.entries()];
  return side === 'asks' ? out.sort((a,b)=>a[0]-b[0]) : out.sort((a,b)=>b[0]-a[0]);
}

// ── RENDER ORDER BOOK ──
function renderOB() {
  if (!snapDone) return;

  const asksRaw = groupSide(book.asks, 'asks').slice(0, levels);
  const bidsRaw = groupSide(book.bids, 'bids').slice(0, levels);

  const askTot = asksRaw.reduce((s,[,q])=>s+q, 0);
  const bidTot = bidsRaw.reduce((s,[,q])=>s+q, 0);
  const askHl  = askTot > bidTot;
  const bidHl  = bidTot > askTot;

  const allQ  = [...asksRaw, ...bidsRaw].map(([,q])=>q);
  const maxQ  = allQ.length ? Math.max(...allQ) : 1;

  // ── ASKS ──
  // Display: top = highest ask, bottom = lowest ask (nearest spread)
  // Cumulative: grows from lowest ask (bottom) upward
  if (view !== 'bids') {
    const rev = [...asksRaw].reverse(); // rev[0]=highest, rev[last]=lowest
    const cums = new Array(rev.length);
    let run = 0;
    for (let i = rev.length - 1; i >= 0; i--) { run += rev[i][1]; cums[i] = run; }
    asksWrap.innerHTML = rev.map(([p,q], i) => {
      const pct = (q / maxQ * 100).toFixed(1);
      const totCls = askHl ? 'ob-tot hl-sell' : 'ob-tot';
      return `<div class="ob-row ask">
        <div class="depth-bar" style="width:${pct}%"></div>
        <span class="ob-price">${fmtP(p)}</span>
        <span class="ob-qty">${fmtQ(q)}</span>
        <span class="ob-cum">${fmtQ(cums[i])}</span>
        <span class="${totCls}">${fmtQ(askTot)}</span>
      </div>`;
    }).join('');
  } else {
    asksWrap.innerHTML = '';
  }

  // ── BIDS ──
  // Display: top = highest bid (nearest spread), cumulative grows downward
  if (view !== 'asks') {
    let cum = 0;
    bidsWrap.innerHTML = bidsRaw.map(([p,q]) => {
      cum += q;
      const pct = (q / maxQ * 100).toFixed(1);
      const totCls = bidHl ? 'ob-tot hl-buy' : 'ob-tot';
      return `<div class="ob-row bid">
        <div class="depth-bar" style="width:${pct}%"></div>
        <span class="ob-price">${fmtP(p)}</span>
        <span class="ob-qty">${fmtQ(q)}</span>
        <span class="ob-cum">${fmtQ(cum)}</span>
        <span class="${totCls}">${fmtQ(bidTot)}</span>
      </div>`;
    }).join('');
  } else {
    bidsWrap.innerHTML = '';
  }

  // ── SPREAD ──
  if (asksRaw.length && bidsRaw.length) {
    const ba = asksRaw[0][0], bb = bidsRaw[0][0];
    spVal.textContent = `스프레드 ${(ba - bb).toFixed(decPl(ba))}`;
  }
  if (lastPx != null) {
    spPrice.textContent = fmtP(lastPx);
    spPrice.className = `sp-price ${pxDir}`;
  }
}

// ── TRADES ──
function onTrade(d) {
  trades.unshift({ price: parseFloat(d.p), qty: parseFloat(d.q), time: d.T, buy: !d.m });
  if (trades.length > MAX_TR) trades.pop();
  renderTrades();
}
function renderTrades() {
  const thr = parseFloat(hlInput.value);
  const hasT = !isNaN(thr) && thr > 0;
  trBody.innerHTML = trades.map(t => {
    const tm = new Date(t.time).toTimeString().slice(0,8);
    const hl = hasT && t.qty >= thr ? ' hl' : '';
    return `<div class="tr-row ${t.buy?'buy':'sell'}${hl}">
      <span class="t-price">${fmtP(t.price)}</span>
      <span class="t-qty">${fmtQ(t.qty)}</span>
      <span class="t-time">${tm}</span>
    </div>`;
  }).join('');
}
hlInput.addEventListener('input', renderTrades);

// ── TICKER ──
function onTicker(d) {
  const p   = parseFloat(d.c);
  const pct = parseFloat(d.P);
  pxDir  = p >= (lastPx ?? p) ? 'up' : 'down';
  lastPx = p;
  curPriceEl.textContent = fmtP(p);
  curPriceEl.className   = 'cur-price' + (pxDir==='down' ? ' down' : '');
  const sign = pct >= 0 ? '+' : '';
  pctEl.textContent = `${sign}${pct.toFixed(2)}%`;
  pctEl.className   = 'pct' + (pct < 0 ? ' down' : '');
  if (!unit) rebuildUnitOpts();
}

// ── VIEW TOGGLE ──
function setView(v) {
  view = v;
  document.querySelectorAll('#vtog button').forEach(b => b.classList.toggle('on', b.dataset.v === v));
  renderOB();
}

// ── CONN STATUS ──
function setConn(on, txt) {
  dotEl.className = 'dot' + (on ? ' on' : '');
  connEl.textContent = txt;
}

// ── FORMAT ──
function fmtP(p) {
  if (p == null) return '--';
  if (p >= 1000) return p.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
  if (p >= 1)    return p.toFixed(4);
  if (p >= 0.001) return p.toFixed(6);
  return p.toFixed(8);
}
function fmtQ(q) {
  if (q >= 100000) return q.toLocaleString('en-US', { maximumFractionDigits:0 });
  if (q >= 1000)   return q.toLocaleString('en-US', { maximumFractionDigits:2 });
  if (q >= 1)      return q.toFixed(4);
  return q.toFixed(6);
}
function decPl(p) {
  if (p >= 1000) return 2;
  if (p >= 1)    return 4;
  return 6;
}

// ── INIT ──
resetConnect();
</script>
</body>
</html>
